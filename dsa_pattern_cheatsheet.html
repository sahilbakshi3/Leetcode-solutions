<style>
  @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap");
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --ff: "Sora", sans-serif;
    --fm: "JetBrains Mono", monospace;
    --gap: 12px;
  }
  body {
    font-family: var(--ff);
    background: transparent;
    color: var(--color-text-primary);
  }

  .readme-wrap {
    max-width: 680px;
    padding: 0 0 40px;
  }

  .readme-header {
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--color-border-tertiary);
    margin-bottom: 24px;
  }
  .readme-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.4px;
    line-height: 1.2;
  }
  .readme-title span {
    color: #e8593c;
  }
  .readme-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 6px;
    line-height: 1.6;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    border: 0.5px solid;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    padding: 8px 12px;
    font-size: 13px;
    font-family: var(--fm);
    border-radius: 8px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    outline: none;
  }
  .search-box:focus {
    border-color: var(--color-border-primary);
  }
  .filter-btn {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-secondary);
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--ff);
    transition: all 0.15s;
  }
  .filter-btn:hover,
  .filter-btn.active {
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    border-color: var(--color-border-primary);
  }

  .toc {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 24px;
  }
  .toc-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .toc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 4px 8px;
  }
  .toc-item {
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s;
  }
  .toc-item:hover {
    color: var(--color-text-primary);
  }
  .toc-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pattern-card {
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .pattern-card:hover {
    border-color: var(--color-border-secondary);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--color-background-secondary);
  }
  .card-header:hover {
    background: var(--color-background-tertiary);
  }
  .card-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }
  .card-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    border: 0.5px solid;
  }
  .card-arrow {
    font-size: 10px;
    color: var(--color-text-tertiary);
    transition: transform 0.2s;
    margin-left: 2px;
  }
  .card-arrow.open {
    transform: rotate(90deg);
  }

  .card-body {
    padding: 0 16px;
    max-height: 0;
    overflow: hidden;
    transition:
      max-height 0.35s ease,
      padding 0.2s;
  }
  .card-body.open {
    max-height: 1200px;
    padding: 0 16px 16px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--color-text-tertiary);
    margin: 14px 0 6px;
  }

  .signal-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .signal-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }
  .signal-item::before {
    content: "→";
    color: var(--color-text-tertiary);
    flex-shrink: 0;
    margin-top: 1px;
    font-family: var(--fm);
  }

  .keyword-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 6px 0;
  }
  .kw {
    font-size: 11px;
    font-family: var(--fm);
    padding: 2px 8px;
    border-radius: 5px;
    background: var(--color-background-tertiary);
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
  }

  .divider {
    border: none;
    border-top: 0.5px solid var(--color-border-tertiary);
    margin: 12px 0;
  }

  .flow-box {
    background: var(--color-background-tertiary);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    font-family: var(--fm);
    line-height: 1.7;
    color: var(--color-text-secondary);
    white-space: pre-wrap;
    border: 0.5px solid var(--color-border-tertiary);
  }
  .flow-highlight {
    color: var(--color-text-primary);
    font-weight: 500;
  }

  .vs-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .vs-box {
    border-radius: 8px;
    padding: 10px 12px;
    border: 0.5px solid;
  }

  .trap-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .trap {
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }
  .trap-icon {
    font-size: 11px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .complexity-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .complexity-pill {
    font-size: 11px;
    font-family: var(--fm);
    padding: 3px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
    background: var(--color-background-secondary);
  }
  .complexity-pill span {
    color: var(--color-text-primary);
    font-weight: 500;
  }

  .no-result {
    text-align: center;
    padding: 40px 20px;
    color: var(--color-text-tertiary);
    font-size: 14px;
  }
</style>

<div class="readme-wrap">
  <div class="readme-header">
    <div class="readme-title">
      DSA Pattern <span>Recognition</span> Cheatsheet
    </div>
    <div class="readme-sub">
      Interview signal → pattern mapping for NeetCode All. Click any card to
      expand. Use search to filter.
    </div>
    <div class="badge-row" id="badge-row"></div>
  </div>

  <div class="search-row">
    <input
      class="search-box"
      id="search"
      placeholder="Search patterns, keywords, signals..."
      oninput="filterCards()"
    />
    <button class="filter-btn active" onclick="setFilter('all', this)">
      All
    </button>
    <button class="filter-btn" onclick="setFilter('array', this)">Array</button>
    <button class="filter-btn" onclick="setFilter('graph', this)">Graph</button>
    <button class="filter-btn" onclick="setFilter('dp', this)">DP/Rec</button>
  </div>

  <div class="toc">
    <div class="toc-title">Quick Jump</div>
    <div class="toc-grid" id="toc-grid"></div>
  </div>

  <div id="cards-container"></div>
</div>

<script>
  const PATTERNS = [
    {
      id: "two-pointers",
      label: "Two Pointers",
      color: "#3B8BD4",
      tag: "Array",
      tagColor: "#185FA5",
      category: "array",
      complexity: { time: "O(n)", space: "O(1)" },
      signals: [
        "Sorted array / string, find a pair, triplet, or subarray",
        "Eliminate duplicates in-place from sorted array",
        "Palindrome check on a string",
        '"Two numbers that sum to target" — sorted input',
        "Partitioning array (0s, 1s, 2s — Dutch flag)",
      ],
      keywords: [
        "sorted",
        "pair",
        "sum = k",
        "palindrome",
        "reverse",
        "in-place",
        "two numbers",
        "container with water",
      ],
      notThis:
        "If array is unsorted and you need pairs → use HashMap instead (O(1) lookup)",
      flow: `Is input SORTED (or can sorting it help)?
  YES → Two Pointers (l=0, r=n-1, move based on comparison)
  NO  → Try HashMap for pair lookups instead

Do you need to find subarrays/substrings (contiguous)?
  YES → Sliding Window (not Two Pointers)`,
      traps: [
        "Don't use on unsorted arrays for pair sums — HashMap is O(n), two-pointer on unsorted is O(n²)",
        "Two pointers ≠ sliding window. Both use l,r but they're different patterns",
      ],
      vs: {
        a: {
          label: "Two Pointers",
          desc: "Converging from both ends. Both pointers start at array edges.",
        },
        b: {
          label: "Sliding Window",
          desc: "Both pointers move RIGHT. Window expands/shrinks based on validity.",
        },
      },
    },
    {
      id: "sliding-window",
      label: "Sliding Window",
      color: "#1D9E75",
      tag: "Array/String",
      tagColor: "#0F6E56",
      category: "array",
      complexity: { time: "O(n)", space: "O(1) or O(k)" },
      signals: [
        "Longest/shortest contiguous subarray or substring with some constraint",
        '"At most K distinct characters/elements"',
        '"Minimum window containing all chars of pattern"',
        "Fixed window size — max/min sum of subarray of size K",
        "Replace at most K characters to make longest repeating substring",
      ],
      keywords: [
        "contiguous",
        "substring",
        "subarray",
        "window",
        "at most k",
        "longest without",
        "minimum window",
        "consecutive",
      ],
      notThis:
        "If answer at index i depends on dp[i-k] or previously computed results → DP, not SW",
      flow: `Can you define window validity by a single condition on l and r?
  YES → Can you update state in O(1) when expanding right / shrinking left?
    YES → SLIDING WINDOW ✅
    NO  → SW + Data Structure (HashMap, Deque, Heap)
  NO  → DP (current answer needs prior computed results)`,
      traps: [
        '"Contiguous subarray" does NOT always mean sliding window (e.g. max subarray sum with Kadane\'s = DP)',
        "When the window needs a max/min of its contents → use Monotonic Deque inside SW",
      ],
      vs: {
        a: {
          label: "Fixed Window",
          desc: "Size K stays constant. Slide 1 step at a time.",
        },
        b: {
          label: "Variable Window",
          desc: "Expand r until invalid, shrink l until valid again.",
        },
      },
    },
    {
      id: "binary-search",
      label: "Binary Search",
      color: "#BA7517",
      tag: "Array",
      tagColor: "#854F0B",
      category: "array",
      complexity: { time: "O(log n)", space: "O(1)" },
      signals: [
        'Sorted array + "find target / find minimum" → immediate BS',
        '"Search in rotated sorted array" — modified BS',
        'Answer lies in a monotonic range → "Binary search on answer"',
        '"Minimum/maximum value such that condition holds" — classic BS on answer',
        "Finding peak element, Kth smallest, capacity problems",
      ],
      keywords: [
        "sorted",
        "find target",
        "rotated",
        "minimum capacity",
        "kth",
        "feasible",
        "can we achieve",
        "peak",
      ],
      notThis:
        "If array is unsorted and you need to find something → sort first OR use HashMap",
      flow: `Is input sorted OR is the answer space monotonic?
  YES → Binary Search

Is it "find minimum X such that condition(X) is true"?
  YES → Binary Search on the ANSWER (not the array)
  → Define: lo = min possible answer, hi = max possible answer
  → Binary search on that range, checking feasibility each time`,
      traps: [
        "lo=mid vs lo=mid+1: use lo=mid only when hi=mid (never loop infinitely)",
        '"Binary search on answer" trips everyone up — the array isn\'t sorted, the ANSWER SPACE is',
      ],
      vs: {
        a: {
          label: "Classic BS",
          desc: "Find element in sorted array. O(log n).",
        },
        b: {
          label: "BS on Answer",
          desc: '"Min days to ship packages". Search over answer range, verify with greedy.',
        },
      },
    },
    {
      id: "sliding-window-deque",
      label: "Monotonic Stack / Deque",
      color: "#D85A30",
      tag: "Array",
      tagColor: "#993C1D",
      category: "array",
      complexity: { time: "O(n)", space: "O(n)" },
      signals: [
        '"Next greater element" / "next smaller element" to the right or left',
        "Largest rectangle in histogram",
        "Sliding window maximum / minimum (Deque)",
        '"Daily temperatures" — how many days until warmer',
        "Trapping rain water (monotonic approach)",
      ],
      keywords: [
        "next greater",
        "next smaller",
        "daily temperatures",
        "histogram",
        "largest rectangle",
        "sliding window max",
        "stock span",
      ],
      notThis:
        "Not every stack problem needs monotonic stack. Use regular stack for balanced parens, DFS simulation.",
      flow: `Do you need "nearest greater/smaller" for each element?
  YES → Monotonic Stack
    → Increasing stack for "next smaller"
    → Decreasing stack for "next greater"

Do you need max/min of a sliding window of size K?
  YES → Monotonic Deque (double-ended, O(1) per element)`,
      traps: [
        "Increasing vs decreasing stack direction is always confusing — derive it from what you're maintaining",
        "Deque for sliding window max: remove from back if new element is bigger (maintain decreasing order)",
      ],
      vs: {
        a: {
          label: "Monotonic Stack",
          desc: "Next greater/smaller element. O(n) using stack.",
        },
        b: {
          label: "Monotonic Deque",
          desc: "Sliding window max/min. Front = max, pop back on new larger element.",
        },
      },
    },
    {
      id: "prefix-sum",
      label: "Prefix Sum",
      color: "#9F77DD",
      tag: "Array",
      tagColor: "#534AB7",
      category: "array",
      complexity: { time: "O(n) preprocess, O(1) query", space: "O(n)" },
      signals: [
        "Sum of any subarray [l, r] queried multiple times",
        '"Number of subarrays with sum = k" — use prefix + HashMap',
        "2D matrix range sum queries",
        "Running total comparisons, difference arrays",
      ],
      keywords: [
        "subarray sum",
        "range sum",
        "sum equals k",
        "number of subarrays",
        "running sum",
        "difference array",
      ],
      notThis:
        "If you only need one subarray sum → just iterate. Prefix sum shines for MULTIPLE queries.",
      flow: `Do you need subarray sum queries multiple times?
  YES → Build prefix[] array: prefix[i] = prefix[i-1] + nums[i]
  → Query [l,r] = prefix[r] - prefix[l-1]

"Number of subarrays with sum = k"?
  YES → prefix + HashMap trick
  → For each prefix[i], check if prefix[i]-k exists in map`,
      traps: [
        "Off-by-one is brutal here. prefix[0]=0 sentinel saves your life — always use it",
        '"Subarray sum = k" is NOT sliding window because values can be negative',
      ],
      vs: {
        a: {
          label: "Prefix Sum",
          desc: "Precompute running totals. Range query in O(1).",
        },
        b: {
          label: "Sliding Window",
          desc: "Only works when all values positive and you can shrink window.",
        },
      },
    },
    {
      id: "hashmap",
      label: "HashMap / HashSet",
      color: "#5DCAA5",
      tag: "Array/String",
      tagColor: "#0F6E56",
      category: "array",
      complexity: { time: "O(n)", space: "O(n)" },
      signals: [
        '"Two Sum" — unsorted, find pair with target → HashMap',
        "Count frequency of elements",
        "Find duplicate / first unique element",
        "Group anagrams (sorted string as key)",
        "Check if one string is a permutation/anagram of another",
      ],
      keywords: [
        "frequency",
        "count",
        "duplicate",
        "anagram",
        "permutation",
        "two sum unsorted",
        "first unique",
        "group",
      ],
      notThis:
        "If input is sorted → Two Pointers is O(1) space. HashMap wastes space on sorted input.",
      flow: `Unsorted array, need to find pairs or check existence?
  YES → HashMap (key = value, val = index/count)

Need to count frequency of characters/elements?
  YES → HashMap/Array of size 26 (for lowercase chars)

Need to group by some property?
  YES → HashMap with transformed key (e.g. sorted string for anagrams)`,
      traps: [
        "Don't use HashMap when input is already sorted — Two Pointers is strictly better (O(1) space)",
        "For character frequency on lowercase only → int[26] array is faster than HashMap",
      ],
      vs: {
        a: { label: "HashMap", desc: "Unsorted input, O(n) time O(n) space." },
        b: {
          label: "Two Pointers",
          desc: "Sorted input, O(n) time O(1) space.",
        },
      },
    },
    {
      id: "greedy",
      label: "Greedy",
      color: "#E24B4A",
      tag: "Various",
      tagColor: "#A32D2D",
      category: "array",
      complexity: {
        time: "O(n) or O(n log n) with sort",
        space: "O(1) usually",
      },
      signals: [
        '"Maximum number of non-overlapping intervals" → greedy + sort by end',
        '"Minimum number of operations/jumps to reach end"',
        '"Can you reach the last index" → track max reach',
        '"Assign tasks optimally" or "schedule meetings"',
        '"At each step, pick the locally best option" and it never hurts you later',
      ],
      keywords: [
        "maximum number of",
        "minimum operations",
        "can you reach",
        "non-overlapping",
        "schedule",
        "assign",
        "jump game",
        "gas station",
        "intervals",
      ],
      notThis:
        "If future choices affect current optimal choice → DP. Greedy never looks back.",
      flow: `Can you define a clear "best choice" at each step?
  Can making that local best choice EVER hurt the global answer?
    NO → GREEDY ✅

Does ORDER of processing items matter for greedy to work?
  YES → SORT FIRST, then greedy
  NO  → Greedy on raw input

Greedy + Sort triggers:
  → Interval problems (sort by end time)
  → Task/meeting scheduling
  → Assign cookies / jump game II`,
      traps: [
        'Greedy fails when subproblems interact — always verify with exchange argument ("if I swap, does answer get worse?")',
        "Sorting is a tool not a rule — many greedy problems (Jump Game, Gas Station) need no sort",
      ],
      vs: {
        a: {
          label: "Greedy",
          desc: "Make locally optimal choice. Never reconsider. O(n).",
        },
        b: {
          label: "DP",
          desc: "Remember past results. Future choices depend on past. Safer but slower.",
        },
      },
    },
    {
      id: "dp",
      label: "Dynamic Programming",
      color: "#D4537E",
      tag: "Various",
      tagColor: "#993556",
      category: "dp",
      complexity: { time: "O(n²) or O(n*k)", space: "O(n) or O(n²)" },
      signals: [
        '"Number of ways to..." → almost always DP',
        '"Minimum cost/steps to reach..." with choices at each step',
        "Current answer DEPENDS on multiple previous subproblems",
        "Optimal substructure + overlapping subproblems present",
        '"Partition into...", "Can you achieve...", "Count distinct..."',
      ],
      keywords: [
        "number of ways",
        "minimum cost",
        "maximum profit",
        "count",
        "partition",
        "decode",
        "edit distance",
        "knapsack",
        "longest common",
        "coin change",
      ],
      notThis:
        "If locally optimal never hurts global → Greedy (no need to store past results)",
      flow: `Does computing f(i) require f(i-1) AND f(i-2) or similar past results?
  YES → DP

"Number of ways" → almost always DP (count paths through a DAG)

Can you identify: overlapping subproblems + optimal substructure?
  YES → DP

1D DP: dp[i] = something involving dp[i-1], dp[i-2]...
2D DP: dp[i][j] = something involving dp[i-1][j], dp[i][j-1]...

Start with recursion + memoization, then convert to bottom-up`,
      traps: [
        "Define dp state CAREFULLY before coding — wrong state definition = wrong solution",
        "Space optimization: many 2D DP can become 1D (rolling array)",
        '"Max subarray" is Greedy (Kadane\'s), NOT DP despite looking like one',
      ],
      vs: {
        a: {
          label: "Top-down (Memo)",
          desc: "Recursion + cache. Easier to think about. Risk: stack overflow.",
        },
        b: {
          label: "Bottom-up (Tabulation)",
          desc: "Fill table iteratively. Better space, no recursion overhead.",
        },
      },
    },
    {
      id: "recursion-backtracking",
      label: "Recursion / Backtracking",
      color: "#EF9F27",
      tag: "Various",
      tagColor: "#854F0B",
      category: "dp",
      complexity: { time: "O(2ⁿ) or O(n!)", space: "O(n) recursion stack" },
      signals: [
        '"Generate all subsets / permutations / combinations"',
        '"Find all valid arrangements" (N-Queens, Sudoku solver)',
        '"All paths" in a graph or tree',
        "Decision tree where at each step you CHOOSE include/exclude",
        '"Word search" in a grid',
      ],
      keywords: [
        "all subsets",
        "all permutations",
        "combinations",
        "generate all",
        "valid arrangements",
        "N-queens",
        "sudoku",
        "word search",
        "paths",
      ],
      notThis:
        "If you only need ONE optimal answer (not all answers) → DP is faster. Backtracking = brute force with pruning.",
      flow: `Need ALL solutions (not just one optimal)?
  YES → Backtracking (explore all, undo bad choices)

Template:
  backtrack(start, current):
    if valid complete solution → add to results
    for each choice from start..n:
      make choice
      backtrack(next, updated)
      undo choice  ← this is the "back" in backtracking

Key pruning: skip invalid choices EARLY to cut branches`,
      traps: [
        "Forgetting to UNDO the choice after recursion — the entire correctness depends on this",
        "Permutations need a visited[] array; subsets don't (use start index instead)",
        "Duplicate handling: sort first, then skip nums[i]==nums[i-1] at same recursion depth",
      ],
      vs: {
        a: {
          label: "Subsets (2ⁿ)",
          desc: "Include/exclude each element. Use start index.",
        },

  const COLOR_MAP = {};
  PATTERNS.forEach((p) => {
    COLOR_MAP[p.id] = p.color;
  });
  let activeFilter = "all",
    activeSearch = "";

  function buildBadges() {
    const cats = { array: 0, graph: 0, dp: 0 };
    PATTERNS.forEach((p) => cats[p.category]++);
    const labels = {
      array: `${cats.array} Array/String`,
      graph: `${cats.graph} Graph/Tree`,
      dp: `${cats.dp} DP/Recursion`,
    };
    const colors = { array: "#185FA5", graph: "#3B6D11", dp: "#993556" };
    const bg = { array: "#E6F1FB", graph: "#EAF3DE", dp: "#FBEAF0" };
    const row = document.getElementById("badge-row");
    Object.entries(labels).forEach(([k, v]) => {
      const b = document.createElement("span");
      b.className = "badge";
      b.textContent = v;
      b.style.cssText = `color:${colors[k]};border-color:${colors[k]}40;background:${bg[k]}20`;
      row.appendChild(b);
    });
  }

  function buildTOC() {
    const grid = document.getElementById("toc-grid");
    PATTERNS.forEach((p) => {
      const item = document.createElement("div");
      item.className = "toc-item";
      item.innerHTML = `<span class="toc-dot" style="background:${p.color}20;border:1.5px solid ${p.color}60"></span>${p.label}`;
      item.onclick = () => {
        const card = document.getElementById("card-" + p.id);
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
          openCard(p.id);
        }
      };
      grid.appendChild(item);
    });
  }

  function buildCards() {
    const container = document.getElementById("cards-container");
    container.innerHTML = "";
    const filtered = PATTERNS.filter((p) => {
      const matchCat = activeFilter === "all" || p.category === activeFilter;
      const q = activeSearch.toLowerCase();
      const matchSearch =
        !q ||
        p.label.toLowerCase().includes(q) ||
        p.signals.some((s) => s.toLowerCase().includes(q)) ||
        p.keywords.some((k) => k.toLowerCase().includes(q));
      return matchCat && matchSearch;
    });
    if (!filtered.length) {
      container.innerHTML =
        '<div class="no-result">No patterns match your search. Try different keywords.</div>';
      return;
    }
    filtered.forEach((p) => {
      const card = document.createElement("div");
      card.className = "pattern-card";
      card.id = "card-" + p.id;
      card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${p.id}')">
        <span class="card-dot" style="background:${p.color}"></span>
        <span class="card-title">${p.label}</span>
        <span class="card-tag" style="color:${p.tagColor};border-color:${p.tagColor}40;background:${p.color}10">${p.tag}</span>
        <span class="card-arrow" id="arr-${p.id}">▶</span>
      </div>
      <div class="card-body" id="body-${p.id}">
        <div class="section-label">Complexity</div>
        <div class="complexity-row">
          <span class="complexity-pill">Time: <span>${p.complexity.time}</span></span>
          <span class="complexity-pill">Space: <span>${p.complexity.space}</span></span>
        </div>
        <div class="section-label">Signals — use this pattern when:</div>
        <div class="signal-list">${p.signals.map((s) => `<div class="signal-item">${s}</div>`).join("")}</div>
        <div class="section-label">Trigger keywords</div>
        <div class="keyword-row">${p.keywords.map((k) => `<span class="kw">${k}</span>`).join("")}</div>
        <hr class="divider">
        <div class="section-label">Decision flow</div>
        <div class="flow-box">${p.flow.replace(/YES|NO|→/g, (m) => `<span class="flow-highlight">${m}</span>`)}</div>
        <div class="section-label">Common traps</div>
        <div class="trap-row">${p.traps.map((t) => `<div class="trap"><span class="trap-icon">⚠</span>${t}</div>`).join("")}</div>
        <div class="section-label">vs. what it's confused with</div>
        <div class="vs-row">
          <div class="vs-box" style="border-color:${p.color}40;background:${p.color}08">
            <div style="font-size:12px;font-weight:500;margin-bottom:4px;color:${p.color}">${p.vs.a.label}</div>
            <div style="font-size:12px;color:var(--color-text-secondary)">${p.vs.a.desc}</div>
          </div>
          <div class="vs-box" style="border-color:var(--color-border-tertiary);background:var(--color-background-secondary)">
            <div style="font-size:12px;font-weight:500;margin-bottom:4px">${p.vs.b.label}</div>
            <div style="font-size:12px;color:var(--color-text-secondary)">${p.vs.b.desc}</div>
          </div>
        </div>
        <div style="margin-top:12px;padding:8px 12px;border-radius:7px;border:0.5px solid #E24B4A30;background:#E24B4A08">
          <span style="font-size:11px;font-weight:500;color:#E24B4A">NOT this pattern: </span>
          <span style="font-size:12px;color:var(--color-text-secondary)">${p.notThis}</span>
        </div>
      </div>
    `;
      container.appendChild(card);
    });
  }

  function toggleCard(id) {
    const body = document.getElementById("body-" + id);
    const arr = document.getElementById("arr-" + id);
    const isOpen = body.classList.contains("open");
    body.classList.toggle("open", !isOpen);
    arr.classList.toggle("open", !isOpen);
  }

  function openCard(id) {
    const body = document.getElementById("body-" + id);
    const arr = document.getElementById("arr-" + id);
    if (!body.classList.contains("open")) {
      body.classList.add("open");
      arr.classList.add("open");
    }
  }

  function setFilter(cat, btn) {
    activeFilter = cat;
    document
      .querySelectorAll(".filter-btn")
      .forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    buildCards();
  }

  function filterCards() {
    activeSearch = document.getElementById("search").value;
    buildCards();
  }

  buildBadges();
  buildTOC();
  buildCards();
</script>
